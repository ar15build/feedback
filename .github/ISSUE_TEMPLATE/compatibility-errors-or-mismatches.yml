name: Compatibility Error or Mismatch
description: Report products that are incorrectly marked as compatible or incompatible.
title: "[Compatibility]: "
labels:
  - compatibility
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form when AR15.build compatibility logic appears incorrect.
        Website: https://ar15.build
  - type: input
    id: product_a
    attributes:
      label: Component A
      placeholder: Manufacturer / Product name / URL
    validations:
      required: true
  - type: input
    id: product_b
    attributes:
      label: Component B
      placeholder: Manufacturer / Product name / URL
    validations:
      required: true
  - type: dropdown
    id: observed_behavior
    attributes:
      label: What did the system indicate?
      options:
        - Marked compatible (but should be incompatible)
        - Marked incompatible (but should be compatible)
        - No compatibility result shown
        - Other
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Why is this incorrect?
      description: Explain the correct outcome and include any supporting references (manufacturer docs, dimensions, standards).
      placeholder: These parts should be compatible because...
    validations:
      required: true
