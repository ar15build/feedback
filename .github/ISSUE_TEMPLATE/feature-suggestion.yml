name: Feature Suggestion
description: Propose a product feature that improves research, comparison, or data transparency.
title: "[Feature]: "
labels:
  - enhancement
  - product-feedback
body:
  - type: markdown
    attributes:
      value: |
        Share ideas that improve research, comparison, compatibility clarity, or transparency.
        Website: https://ar15.build
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What are you trying to do that the site currently makes difficult or impossible?
      placeholder: As a user, I struggle to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature at a high level.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, or anything else that might help.
    validations:
      required: false
