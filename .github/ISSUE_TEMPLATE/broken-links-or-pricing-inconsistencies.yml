name: Broken Link or Pricing Inconsistency
description: Report dead product links, bad retailer redirects, or pricing mismatches.
title: "[Link/Pricing]: "
labels:
  - retailer-data
  - broken-link
body:
  - type: markdown
    attributes:
      value: |
        Use this form for retailer URL and pricing data issues.
        Website: https://ar15.build
  - type: input
    id: listing_url
    attributes:
      label: AR15.build listing URL
      placeholder: https://ar15.build/...
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Broken outbound link
        - Redirects to wrong product
        - Price mismatch
        - Out-of-stock status mismatch
        - Other retailer data issue
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What's wrong?
      description: Describe the issue — include the retailer name, what you saw, and what the correct value should be.
      placeholder: |
        Retailer: Example Guns
        Shows $149.99 but current price is $129.99
        Link goes to a 404 page
    validations:
      required: true
