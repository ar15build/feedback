name: Incorrect Product Specifications
description: Report incorrect product dimensions, materials, compatibility tags, or technical attributes.
title: "[Spec Error]: "
labels:
  - data-quality
  - specs
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AR15.build data quality.
        Website: https://ar15.build
  - type: input
    id: product_url
    attributes:
      label: Product page URL
      placeholder: https://ar15.build/...
    validations:
      required: true
  - type: textarea
    id: incorrect_fields
    attributes:
      label: What is incorrect?
      description: List each field with the current wrong value.
      placeholder: |
        - Barrel length: currently shows 14.5 in
        - Material: currently shows 4140 steel
    validations:
      required: true
  - type: textarea
    id: correct_values
    attributes:
      label: What are the correct values?
      description: Include corrected values and at least one source (manufacturer page, datasheet, etc.).
      placeholder: |
        - Barrel length should be 16 in
        - Material should be 4150 CMV
        Source: https://...
    validations:
      required: true
