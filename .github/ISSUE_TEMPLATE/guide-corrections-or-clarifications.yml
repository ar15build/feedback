name: Guide Correction or Clarification
description: Suggest edits to improve accuracy or clarity in AR15.build guides.
title: "[Guide]: "
labels:
  - guides
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request corrections or clarifications in AR15.build guides.
        Guides: https://ar15.build/guides
  - type: input
    id: guide_url
    attributes:
      label: Guide URL
      placeholder: https://ar15.build/...
    validations:
      required: true
  - type: textarea
    id: section
    attributes:
      label: What needs to change?
      description: Quote or summarize the section that needs updating.
    validations:
      required: true
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested correction
      description: Provide the corrected wording or explain what should be added or removed.
    validations:
      required: true
